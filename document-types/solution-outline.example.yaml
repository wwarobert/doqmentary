personas:
  - id: review-enterprise-architect
    title: Enterprise Architect
    lens: Alignment with enterprise principles and prior decisions.
    checks:
      - Every referenced principle exists in the principles library and is relevant.
      - Every referenced decision exists in the decisions library and is honored.
      - Selection is complete — no applicable principle or decision was omitted.
      - Each selected item states how it applies to this solution.

  - id: review-solution-architect
    title: Solution Architect
    lens: Technical soundness and pattern fitness.
    checks:
      - The target conceptual design is coherent and implementable.
      - Design decisions are justified and trade-offs are stated.
      - Risks have concrete, proportionate mitigations.
      - Assumptions and dependencies are explicit and testable.

  - id: review-manager-readability
    title: Manager (non-technical readability)
    lens: Readability for a non-technical reader.
    checks:
      - The Summary is understandable without reading the body.
      - Jargon is defined or avoided.
      - Next steps list clear owners and outcomes.
      - Scope and out-of-scope are unambiguous.
