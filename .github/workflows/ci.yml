name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: cli

      - name: Run tests
        run: npm test
        working-directory: cli

  publish-wiki:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone wiki repository
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" /tmp/wiki

      - name: Sync wiki content
        run: |
          # Remove all existing wiki files (keep .git)
          find /tmp/wiki -mindepth 1 -not -path '/tmp/wiki/.git*' -delete

          # Copy wiki source into wiki repo root
          cp -r wiki/. /tmp/wiki/

      - name: Commit and push
        run: |
          cd /tmp/wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "docs: sync wiki from main @ ${{ github.sha }}"
            git push
          fi
